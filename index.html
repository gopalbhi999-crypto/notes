<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gopal's Personal Notes</title>
    <style>
        /* Modern Dark Theme */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f172a; 
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: #1e293b; 
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .author {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Buttons Styling */
        .btn {
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Unique Colors */
        .btn-yt { background: #ef4444; } 
        .btn-physics { background: #0ea5e9; } 
        .btn-chem { background: #f59e0b; } 
        .btn-maths { background: #10b981; }
        .btn-bio { background: #d946ef; } /* Biology Pink/Magenta */

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            filter: brightness(1.2);
        }

        .note-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.5;
        }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <audio id="bg-music" loop>
    <source src="aapki-file-ka-naam.mp3" type="audio/mpeg">
</audio>


    <div class="container">
        <h1>GOPAL SHARMA</h1>
        <p class="author">Personal Notes & Resources</p>

        <div class="btn-list">
            <a href="y.html" class="btn btn-yt">
                📺 YouTube Channel
            </a>
            
            <a href="CH1%20Electric%20Charges%20and%20Fields.pdf" class="btn btn-physics" target="_blank">
                ⚛️ Physics Notes
            </a>

            <a href="che.pdf" class="btn btn-chem" target="_blank">
                🧪 Chemistry Notes
            </a>

            <a href="m.html" class="btn btn-maths">
                📐 Maths Homework & Notes
            </a>

            <a href="bio.pdf" class="btn btn-bio" target="_blank">
                🧬 Biology PYQ
            </a>
            <button onclick="openModal()" class="btn btn-donate" style="background: linear-gradient(135deg, #facc15, #eab308); color: #000; margin-top: 10px;">☕ Support My Work (QR Code)</button>

        </div>

        <p class="note-text">
            *After Class 12, content will be provided consistently.
        </p>

        <footer>Created with ❤️ by Gopal</footer>
    </div>
    <div id="myModal" style="display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center;">
    <div style="background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #eab308; width: 80%; max-width: 320px; position: relative; color: white;">
        <span onclick="closeModal()" style="position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer;">&times;</span>
        <h2 style="color: #eab308; margin: 0 0 10px 0;">Support Me[ NOT NECESSARY]</h2>
        <p style="font-size: 0.9rem;">Scan to Pay via UPI</p>
        
        <img src="S.jpeg" alt="UPI QR" style="width: 100%; border-radius: 10px; margin: 15px 0; border: 4px solid white;">
        
        <p style="font-weight: bold; margin-bottom: 20px;">UPI ID: NOT AVALIABLE😜</p>
        <button onclick="closeModal()" style="background: #eab308; color: black; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold;">Close</button>
    </div>
</div>

<script>
    function openModal() { document.getElementById("myModal").style.display = "flex"; }
    function closeModal() { document.getElementById("myModal").style.display = "none"; }
    // Bahar click karne par band ho jaye
    window.onclick = function(event) {
        if (event.target == document.getElementById("myModal")) { closeModal(); }
    }
</script>
    <script>
  window.addEventListener('click', () => {
    const audio = document.getElementById('bg-music');
    if (audio.paused) {
        audio.play();
    }
  }, { once: true });
</script>



</body>
</html>
