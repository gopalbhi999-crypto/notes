<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Assets Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        .image-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .image-container img {
            width: 300px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .pdf-container {
            width: 90%;
            max-width: 1000px;
            height: 800px;
            border: 2px solid #333;
        }
        iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <h1>Physics Resources</h1>

    <div class="image-container">
        <img src="https://raw.githubusercontent.com/GITHUB_USERNAME/REPO_NAME/main/M2.jpeg" alt="M2 Image">
        <img src="https://raw.githubusercontent.com/GITHUB_USERNAME/REPO_NAME/main/B1.jpeg" alt="B1 Image">
        <img src="https://raw.githubusercontent.com/GITHUB_USERNAME/REPO_NAME/main/B2.jpeg" alt="B2 Image">
    </div>

    <div class="pdf-container">
        <iframe src="https://raw.githubusercontent.com/GITHUB_USERNAME/REPO_NAME/main/CH1_Electric_Charges_and_Fields.pdf">
            Your browser does not support PDFs. 
            <a href="https://raw.githubusercontent.com/GITHUB_USERNAME/REPO_NAME/main/CH1_Electric_Charges_and_Fields.pdf">Download PDF</a>
        </iframe>
    </div>

</body>
</html>
