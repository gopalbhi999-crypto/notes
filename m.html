<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Gallery - Gopal</title>
    <style>
        /* Modern Dark Theme */
        body {
            background-color: #050505; /* Deep Black */
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding-top: 40px;
        }

        h1 {
            color: #00ff00; /* Neon Green */
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        /* Image Gallery Layout */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }

        .image-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 15px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .image-card:hover {
            transform: scale(1.02);
            border-color: #00ff00;
        }

        .image-card img {
            width: 100%;
            border-radius: 12px;
            display: block;
            margin-bottom: 10px;
            /* Image smooth load effect */
            background: #1a1a1a; 
            min-height: 200px; 
        }

        .img-caption {
            color: #888;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Back Button - Sleek Design */
        .back-btn {
            margin-top: 50px;
            margin-bottom: 50px;
            display: inline-block;
            padding: 15px 40px;
            color: #00ff00;
            text-decoration: none;
            border: 2px solid #00ff00;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            transform: translateY(-3px);
        }

        footer {
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Maths Resources</h1>
        <p class="subtitle">Visual notes provided by Gopal</p>

        <div class="gallery">
            <div class="image-card">
                <img src="M2.jpeg" alt="Maths Image M2">
                <div class="img-caption">Reference Code: M2</div>
            </div>

            <div class="image-card">
                <img src="B1.jpeg" alt="Maths Image B1">
                <div class="img-caption">Concept Board: B1</div>
            </div>

            <div class="image-card">
                <img src="B2.jpeg" alt="Maths Image B2">
                <div class="img-caption">Formula Sheet: B2</div>
            </div>
        </div>

        <a href="index.html" class="back-btn">⬅ BACK TO HOME</a>

        <footer>POWERED BY GOPAL'S IPAD SERVER</footer>
    </div>

</body>
</html>
